<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <title>Lista de Itens</title>
</head>
<body>

    <!-- container abrigando TUDO: título, linha divisória, inputs, botões e lista-->
    <div class="container">
        <div class="col-md-10 offset-md-1">

            <!-- H1 MEUS FILMES FAVORITOS -->
            <div class="container">
                <br>
                <h1 class="align-center"> Meus Filmes Favoritos </h1>
            </div>

            <div class="bg-secondary mx-auto opacity-25" style="width: 100%; height: 2px;"></div>

            <!-- INPUTS + BOTÕES -->
            <div class="container">

            <br>
            <div class="row">

                <!-- inputs -->
                <div class="col">

                    <div class="input-group input-group-lg mb-2">
                    <span class="input-group-text" id="inputGroup-sizing-lg" style="flex: 0 0 20%"> Título do Filme </span>
                    <input type="text" class="form-control" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-lg" id="titulo">
                    </div>

                    <br> 
                    
                    <div class="input-group input-group-lg mb-2">
                    <span class="input-group-text" id="inputGroup-sizing-lg" style="flex: 0 0 20%"> Gênero </span>
                    <input type="text" class="form-control" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-lg" id="genero">
                    </div>

                </div>

            </div>

                <br> 

                
                    <div class="col">
                    <!-- botões -->
                    <div class="row justify-content-end">
                        <div class="col-md-4 mb-2">
                            <button type="button" class="btn btn-outline-primary btn-lg" onclick="toggleLista()">
                            <i class="bi bi-card-list"></i> 
                            Mostrar / Ocultar Lista</button>
                        </div>

                        <div class="col-md-3 mb-2">
                            <button type="button" class="btn btn-primary btn-lg" onclick="adicionarItem()"> 
                            <i class="bi bi-patch-plus"></i> 
                            Adicionar</button>
                        </div>

                    </div>
                    </div>
                    

                

            

            <div class="bg-secondary mx-auto opacity-25" style="width: 100%; height: 2px;"></div>

            <!-- LISTA -->
            <div class="container">
            
                <!-- lista -->
            <div id="lista" class="mt-4 col-md-8 mx-auto" style="display:none;"></div>

            </div>

            </div>

        </div>
    


    </div>
    
    <script src="script.js"></script>
</body>
</html>
